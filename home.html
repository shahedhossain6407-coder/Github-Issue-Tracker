<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI & tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google-font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github-Issue-Tracker</title>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
        /* open  */
        .green-border{
          border-top: rgb(23, 144, 23) solid 7px;
          border-radius: 12px;
        }
        /* close  */
        .purple-border{  
          border-top: rgba(168, 85, 247, 1) solid 7px ;
          border-radius: 12px;
        }
        .active{
          background-color: #4A00FF;
          color: white;
        }
    </style>
</head>
<body>
    <div class="navbar bg-base-100 shadow-sm  px-20  md:flex  justify-between ">
        <div class="flex-1">
           <div class="flex">
            <img class="w-[40px]" src="./assets/github-logo.png" alt="">
            <h1 class="btn btn-ghost text-xl">GitHub Issues Tracker</h1>
           </div>
        </div>
        <div class="flex gap-2">
          <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
          <div class="dropdown dropdown-end">
              <div class="rounded-md flex ">
                <button id="search-btn" class="btn btn-primary w-auto"><i class="fa-solid fa-plus"></i>Search</button>
              </div>
            </div>
          </div>
        </div>
        <main>
         <section class="btn-section w-10/12 shadow-sm mx-auto my-20 p-5  ">
         <div class="flex gap-5  ">
         <button onclick="clickBtn(`all-btn`)" id="all-btn" class="btn btn-outline w-30">All</button>
         <button onclick="clickBtn(`open-btn`)" id="open-btn" class="btn btn-outline w-30">Open</button>
         <button onclick="clickBtn(`closed-btn`)" id="closed-btn" class="btn btn-outline w-30">Closed</button>
         </div>
         </section>

        <!-- loading........  -->
         <div id="loading" class=" flex justify-center items-center hidden ">
          <span class="loading loading-dots loading-xl"></span>
         </div>

         <section class="count-section  w-10/12 shadow-sm mx-auto my-20 p-5 ">
            <div class="navbar">
                <div class="flex-1 flex gap-5 items-center">
                    <img class="w-[50px]" src="./assets/Aperture.png" alt="">
                  <div>
                    <h1 class=" text-xl font-semibold md:font-bold text-2xl"><span id="total-issue">0</span> Issues</h1>
                    <p class="text-sm md:font-semibold  text-gray-500">Track and manage your project issues</p>
                  </div>
                </div>
                <div class="flex-none">
                  <ul class="menu menu-horizontal px-1 flex ">
                  <div class="flex items-center gap-3">
                 <div class="badge badge-primary bg-green-700 badge-xs"></div>
                 <li>Open</li>
                 <div class="badge badge-primary bg-purple-700 badge-xs"></div>
                 <li>Closed</li>
                  </div>
                  </ul>
                </div>
              </div>
         </section>
        </main>
        
        <section id="issue-container" class="grid grid-cols-1 md:grid-cols-4 w-10/12 mx-auto gap-10 ">
            <!-- add to display for all issue card  -->
           
        </section>
     

        <!-- modal input  -->
        <!-- <section class="modal-section  w-10/12 mx-auto  "> -->
           
            <!-- Open the modal using ID.showModal() method -->
           
            <dialog id="details_modal" class="modal modal-bottom sm:modal-middle"
            >
              <div id="details-container" class="modal-box  flex flex-col justify-between rounded-md  md:px-10 py-5 ">

            </div>
              
            </dialog>

        </section>
     <script src="script/issue.js"></script>
     
</body>
</html>
