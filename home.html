<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI & tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google-font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github-Issue-Tracker</title>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
    <div class="navbar bg-base-100 shadow-sm px-20 mx-auto ">
        <div class="flex-1 ">
           <div class="flex">
            <img class="w-[40px]" src="./assets/github-logo.png" alt="">
            <h1 class="btn btn-ghost text-xl">GitHub Issues Tracker</h1>
           </div>
        </div>
        <div class="flex gap-2">
          <input id="search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
          <div class="dropdown dropdown-end">
              <div class="rounded-md flex ">
                <button class="btn btn-primary w-auto"><i class="fa-solid fa-plus"></i>New Issue</button>
              </div>
            </div>
          </div>
        </div>
        <main>
         <section class="btn-section w-10/12 shadow-sm mx-auto my-20 p-5 ">
         <div class="flex gap-5 ">
         <button id="all-btn" class="btn btn-primary w-30">All</button>
         <button id="open-btn" class="btn btn-outline w-30">Open</button>
         <button id="closed-btn" class="btn btn-outline w-30">Closed</button>
         </div>
         </section>

         <section class="count-section  w-10/12 shadow-sm mx-auto my-20 p-5 ">
            <div class="navbar  ">
                <div class="flex-1 flex gap-5 items-center">
                    <img class="w-[50px]" src="./assets/Aperture.png" alt="">
                  <div>
                    <h1 class="font-bold text-2xl"><span id="total-issue">0</span> Issues</h1>
                    <p class="font-semibold  text-gray-500">Track and manage your project issues</p>
                  </div>
                </div>
                <div class="flex-none">
                  <ul class="menu menu-horizontal px-1 flex ">
                  <div class="flex items-center gap-3">
                 <div class="badge badge-primary bg-green-400 badge-xs"></div>
                 <li>Open</li>
                 <div class="badge badge-primary bg-purple-400 badge-xs"></div>
                 <li>Closed</li>
                  </div>
                  </ul>
                </div>
              </div>
         </section>
        </main>
        
        <section id="issue-container" class="grid grid-cols-4 w-10/12 mx-auto gap-10 h-[100%]">
            <!-- add to display for all issue card  -->
            
        </section>

        <!-- modal input  -->
        <section class="modal-section  w-10/12 mx-auto  ">
           
            <!-- Open the modal using ID.showModal() method -->
            <button class="btn" onclick="my_modal_5.showModal()">open modal</button>
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">

              <div class="modal-box  flex flex-col justify-between rounded-md px-10 py-5 ">
                <div class="space-y-6">
                    <h1 class="font-bold text-2xl">Fix broken image uploads</h1>

                 <div class="flex items-center gap-2">
                 <button class="btn btn-accent rounded-3xl text-white">Opened</button>
                 <span class="text-xl font-bold">•</span>
                 <h2 class="text-gray-500 text-xl"> by Fahim Ahmed</h2>
                 <span class="text-xl font-bold">•</span>
                 <h2 class="text-gray-500 text-sm">22/02/2026</h2>
                 </div>

                 <div class="flex gap-2">
                    <button class="btn btn-outline btn-error rounded-full"><i class="fa-solid fa-bug"></i>Bug</button>
                    <button class="btn btn-outline btn-warning rounded-full"><i class="fa-regular fa-life-ring"></i> help wanted</button>
                   </div>
                   <p class="text-xl text-gray-500">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
                </div>
                <div>
                    <div class="bg-blue-50 mt-10 p-5 flex gap-20 rounded-md ">
                       <div>
                        <h1>Assignee:</h1>
                        <h2>Fahim Ahmed</h2>
                       </div>
                        <div class="flex flex-col justify-center items-start gap-2 ">
                            <h1>Priority:</h1>
                            <button class="btn btn-active btn-error w-[70px] h-[24px] rounded-[80px] text-white ">High</button>
                        </div>
                    </div>
                </div>
                
                <div class="modal-action">
                  <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                  </form>
                </div>
            </div>
              
            </dialog>

        </section>
     <script src="script/issue.js"></script>
</body>
</html>
