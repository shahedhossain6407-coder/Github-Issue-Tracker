<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI & tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google-font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github-Issue-Tracker</title>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
   <header class="w-6/12 mx-auto shadow-md ">
    <div class="nav-container py-6 space-y-6 ">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">
        <div class="nav-details text-center ">
        <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
        <p class=" text-gray-500">Sign in to manage your issues</p>
       </div>
    </div>
    <main>
        
            <fieldset class="fieldset rounded-box w-120 mx-auto  ">
                <label class="label text-black text-lg">Username</label>
                <input id="name-input" type="text" class="input w-120" placeholder="Enter Username" />
                 <h5 class="text-blue-500 text-sm">Default: admin</h5><br>
                <label class="label text-black text-lg">Password</label>
                <input id="password-input" type="password" class="input w-120" placeholder="Enter Password" />
                <h5 class="text-blue-500 text-sm">Default: admin123</h5>
                <button  id="loginBtn" class="btn btn-primary mt-4">Login</button>
              </fieldset>
   
        <section class="footer-section py-6">
              <div class="flex w-7/12 flex-col mx-auto">
              <div class="divider">OR</div>
              </div>
               <div class="user text-center">
                <p class="text-gray-500 pb-4">Demo Credentials:</p>
                    <h1>
                    <span class="font-bold">Username :</span>admin<br>
                    <span class="font-bold">Password :</span>admin123
                    </h1>
               </div>
        </section>
    </main>
   </header>
   
  <script src="./script/login.js"></script>
  
</body>
</html>
